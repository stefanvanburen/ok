name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      # go test runs go vet's high-confidence checks itself, so there's no
      # separate vet step. Run without -race first: the zero-allocation test
      # is built out under -race (the race detector instruments allocations).
      - run: go test ./...
      - run: go test -race ./...
